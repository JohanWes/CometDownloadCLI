name: Android APK Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create or update"
        required: true
      draft:
        description: "Create the release as a draft"
        required: true
        default: "true"

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      TAG_NAME: ${{ github.event.inputs.release_tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Decode release keystore
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$ANDROID_KEYSTORE_PATH"

      - name: Build release APK
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Name APK
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/app-release.apk "release-artifacts/CometDownloadCLI-Android-${TAG_NAME}.apk"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          DRAFT_FLAG: ${{ github.event.inputs.draft }}
        run: |
          APK="release-artifacts/CometDownloadCLI-Android-${TAG_NAME}.apk"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$APK" --clobber
          else
            EXTRA_ARGS=()
            if [ "$DRAFT_FLAG" = "true" ]; then
              EXTRA_ARGS+=(--draft)
            fi
            gh release create "$TAG_NAME" "$APK" --generate-notes "${EXTRA_ARGS[@]}"
          fi
